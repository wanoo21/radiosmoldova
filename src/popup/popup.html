<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Radio Moldova, Romania and Ukraine</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <header class="panel-heading" id="panelHeading">
          <div class="eq-overlay" id="eqOverlay" aria-hidden="true"></div>
          <button id="playPause" type="button" class="play-pause" aria-label="Play or pause">
            <svg id="playPauseIcon" class="play-pause-icon" viewBox="0 0 24 24" aria-hidden="true">
              <use id="playPauseIconUse" href="#icon-play"></use>
            </svg>
          </button>
          <div class="meta">
            <div id="title">Choose a station from the list</div>
            <div id="status">Idle</div>
          </div>
        </header>

        <div class="panel-body">
          <label id="searchLabel" class="sr-only" for="search">Search radio stations</label>
          <input
            id="search"
            type="search"
            placeholder="Search stations"
            autocomplete="off"
            spellcheck="false"
            inputmode="search"
            aria-describedby="searchHint"
          />
          <p id="searchHint" class="sr-only">
            Type to filter stations. Press Slash to focus and Escape to clear.
          </p>
          <label class="volume">
            <input id="volume" type="range" min="0" max="100" value="30" />
          </label>
        </div>

        <section class="regions">
          <button id="favoriteTabButton" type="button" data-region="favorite" class="favorite-tab" aria-label="Favorite stations">
            <svg class="favorite-tab-icon" viewBox="0 0 24 24" aria-hidden="true">
              <use href="#icon-star-outline"></use>
            </svg>
          </button>
          <button id="regionMdButton" type="button" data-region="md">Moldova</button>
          <button id="regionRoButton" type="button" data-region="ro">Romania</button>
          <button id="regionUaButton" type="button" data-region="ua">Ukraine</button>
        </section>

        <section id="stations" class="stations"></section>
      </section>
    </main>
    <svg class="sprite" aria-hidden="true" focusable="false">
      <symbol id="icon-play" viewBox="0 0 24 24">
        <path d="M8 5.5v13l10-6.5z"></path>
      </symbol>
      <symbol id="icon-stop" viewBox="0 0 24 24">
        <rect x="7" y="7" width="10" height="10" rx="1.5"></rect>
      </symbol>
      <symbol id="icon-spinner" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="8.5" fill="none" stroke="currentColor" stroke-width="2" opacity="0.35"></circle>
        <path d="M12 3.5a8.5 8.5 0 0 1 8.5 8.5" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"></path>
      </symbol>
      <symbol id="icon-error" viewBox="0 0 24 24">
        <path
          d="M12 3.8 21.1 19a1 1 0 0 1-.86 1.5H3.76A1 1 0 0 1 2.9 19L12 3.8Zm0 4.7a1 1 0 0 0-1 1v5.2a1 1 0 1 0 2 0V9.5a1 1 0 0 0-1-1Zm0 9.1a1.25 1.25 0 1 0 0 2.5 1.25 1.25 0 0 0 0-2.5Z"
        ></path>
      </symbol>
      <symbol id="icon-star-outline" viewBox="0 0 24 24">
        <path
          d="m12 3.5 2.65 5.37 5.93.86-4.29 4.18 1.01 5.9L12 17.02 6.7 19.81l1.01-5.9-4.29-4.18 5.93-.86L12 3.5Z"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linejoin="round"
        ></path>
      </symbol>
      <symbol id="icon-star-filled" viewBox="0 0 24 24">
        <path
          d="m12 3.5 2.65 5.37 5.93.86-4.29 4.18 1.01 5.9L12 17.02 6.7 19.81l1.01-5.9-4.29-4.18 5.93-.86L12 3.5Z"
        ></path>
      </symbol>
    </svg>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
